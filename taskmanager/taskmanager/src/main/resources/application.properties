# ─────────────────────────────────────────────
# MongoDB Configuration
# ─────────────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/taskmanager

# ─────────────────────────────────────────────
# Server Configuration
# ─────────────────────────────────────────────
server.port=8080
spring.application.name=taskmanager

# ─────────────────────────────────────────────
# Logging - shows SQL-like MongoDB queries in console
# ─────────────────────────────────────────────
logging.level.org.springframework.data.mongodb=DEBUG

# ─────────────────────────────────────────────
# Jackson - How Java objects are serialized to JSON
# ─────────────────────────────────────────────
# Formats LocalDateTime as "2025-04-01T10:00:00" instead of array
spring.jackson.serialization.write-dates-as-timestamps=false